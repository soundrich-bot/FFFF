<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fast Feedback Frequency Finder</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0e0a06">
<meta name="description" content="A logarithmic tone generator and feedback finder for live sound.">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<style>
  :root{
    --bg:#0e0a06;--wood:#241810;--wood-lo:#1a1109;
    --gold:#f5b301;--gold-hi:#ffd24a;--red:#d23c2c;--green:#3aa65a;
    --cream:#f1e4c4;--dim:#9c8a60;--hair:rgba(245,179,1,.24);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(140% 55% at 50% 20%, rgba(245,179,1,.07), transparent 55%),
      radial-gradient(rgba(245,179,1,.05) 1px, transparent 1.4px) 0 0/9px 9px,
      var(--bg);
    color:var(--cream);font-family:system-ui,-apple-system,"Helvetica Neue",sans-serif;
    display:flex;flex-direction:column;height:100dvh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    overscroll-behavior:none;user-select:none;
  }
  .panel{background:linear-gradient(180deg,var(--wood),var(--wood-lo));border:1px solid var(--hair);border-radius:4px;
    box-shadow:inset 0 1px 0 rgba(255,220,120,.08),inset 0 -6px 14px rgba(0,0,0,.4);}

  header{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.1rem .4rem;}
  header svg{height:34px;width:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .brand .word{font-size:1.1rem;font-weight:800;letter-spacing:.16em;color:var(--gold);
    text-shadow:0 2px 0 rgba(0,0,0,.55),0 0 12px rgba(245,179,1,.3);}
  .brand .sub{font-size:.48rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);margin-top:.35rem;}
  header .state{margin-left:auto;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);
    border:1px solid var(--hair);border-radius:3px;padding:.24rem .5rem;}
  header .state.tone{color:var(--red);border-color:var(--red);}
  header .state.hear{color:var(--green);border-color:var(--green);}
  header .state.sweep{color:var(--gold);border-color:var(--gold);}

  .meter-wrap{margin:.15rem 1.1rem;height:90px;overflow:hidden;}
  canvas{display:block;width:100%;height:90px;}

  .readout{text-align:center;padding:.4rem 1rem 0;}
  .freq{font-size:clamp(2.5rem,14vw,3.7rem);font-weight:400;line-height:1;letter-spacing:.01em;color:var(--gold);
    font-variant-numeric:tabular-nums;text-shadow:0 2px 0 rgba(0,0,0,.5),0 0 16px rgba(245,179,1,.28);
    background:transparent;border:none;width:100%;text-align:center;font-family:inherit;outline:none;padding:0;}
  .freq.hearing{color:var(--green);text-shadow:0 2px 0 rgba(0,0,0,.5),0 0 16px rgba(58,166,90,.35);}
  .freq:focus{color:var(--gold-hi);}
  .unit{font-size:.66rem;color:var(--dim);letter-spacing:.42em;margin-top:.1rem;}
  .note{font-size:.7rem;color:var(--gold-hi);margin-top:.35rem;letter-spacing:.1em;font-variant-numeric:tabular-nums;min-height:1em;}
  .note.hearing{color:var(--green);}
  .note .cents{color:var(--dim);}
  .subline{font-size:.56rem;color:var(--dim);letter-spacing:.06em;margin-top:.25rem;min-height:1em;font-variant-numeric:tabular-nums;}

  .slider-block{padding:.4rem 1.2rem .1rem;}
  .rowmini{display:flex;justify-content:center;align-items:center;gap:.5rem;margin-bottom:.4rem;}
  .rowmini button{background:transparent;border:1px solid var(--hair);color:var(--dim);border-radius:3px;
    font-family:inherit;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .6rem;}
  .rowmini button.sel,.rowmini button.on{color:var(--gold);border-color:var(--gold);background:rgba(245,179,1,.08);}
  .sweep-row{display:flex;align-items:center;gap:.6rem;margin:.15rem 0 .1rem;}
  .sweep-row #speed{flex:1;}
  .sweep-row .sval{font-size:.58rem;color:var(--dim);width:2.6em;text-align:right;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:30px;background:transparent;margin:0;}
  input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;
    background:linear-gradient(90deg,var(--gold) var(--fill,20%),rgba(245,179,1,.16) var(--fill,20%));}
  input[type=range]::-moz-range-track{height:5px;border-radius:3px;background:rgba(245,179,1,.16);}
  input[type=range]::-moz-range-progress{height:5px;border-radius:3px;background:var(--gold);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold-hi),var(--gold) 60%,#9a6f00);margin-top:-9px;border:2px solid #120c05;box-shadow:0 2px 4px rgba(0,0,0,.6);}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold-hi),var(--gold) 60%,#9a6f00);border:2px solid #120c05;}
  .ends{display:flex;justify-content:space-between;font-size:.54rem;color:var(--dim);letter-spacing:.05em;margin:0 2px;}

  .pane{overflow-y:auto;flex:1;padding:.6rem 1.2rem .1rem;}
  .grid{display:flex;flex-wrap:wrap;gap:.5rem;align-content:flex-start;}
  .grid button{flex:1 1 auto;min-width:4.1rem;background:linear-gradient(180deg,var(--wood),var(--wood-lo));
    border:1px solid var(--hair);color:var(--cream);border-radius:4px;font-family:inherit;letter-spacing:.02em;
    box-shadow:inset 0 1px 0 rgba(255,220,120,.07);}
  .stations button{font-size:1rem;font-weight:600;font-variant-numeric:tabular-nums;padding:.7rem .3rem;}
  .stations button:active{background:rgba(245,179,1,.12);}
  .stations button.here{color:var(--gold);border-color:var(--gold);text-shadow:0 0 8px rgba(245,179,1,.4);}
  .stations button.heard{color:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(58,166,90,.35);}

  .listen{margin:.35rem 1.1rem 0;}
  .listen button{width:100%;display:flex;align-items:center;justify-content:center;gap:.6rem;
    background:linear-gradient(180deg,var(--wood),var(--wood-lo));border:1px solid var(--green);color:var(--green);
    border-radius:5px;font-family:inherit;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;padding:.7rem 0;
    box-shadow:inset 0 1px 0 rgba(255,220,120,.06);}
  .listen button .lamp{width:11px;height:11px;border-radius:50%;background:#173c22;box-shadow:inset 0 0 3px #000;}
  .listen button.on{background:var(--green);color:#0c2013;border-color:var(--green);box-shadow:0 0 16px rgba(58,166,90,.4);}
  .listen button.on .lamp{background:#eafff0;box-shadow:0 0 8px #baffce;}

  .controls{display:flex;align-items:center;gap:.9rem;padding:.4rem 1.2rem;}
  .wave-field{display:flex;align-items:center;gap:.4rem;}
  .wave-field label{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);}
  select{background:var(--wood-lo);border:1px solid var(--hair);color:var(--cream);font-family:inherit;font-size:.7rem;
    padding:.35rem 1.4rem .35rem .5rem;border-radius:3px;letter-spacing:.05em;-webkit-appearance:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 12px) center,calc(100% - 7px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
  .vol{display:flex;align-items:center;gap:.5rem;flex:1;}
  .vol input{flex:1;}
  .vol .v-val{font-size:.58rem;color:var(--dim);width:2.6em;text-align:right;font-variant-numeric:tabular-nums;}

  .transport{display:flex;gap:.5rem;padding:.35rem 1.1rem .55rem;}
  .transport button{flex:1;background:linear-gradient(180deg,var(--wood),var(--wood-lo));border:1px solid var(--hair);
    color:var(--cream);border-radius:6px;font-family:inherit;font-size:.92rem;padding:.9rem 0;letter-spacing:.02em;
    box-shadow:inset 0 1px 0 rgba(255,220,120,.07);}
  .transport button:active{background:rgba(245,179,1,.1);}
  .transport button.mini{flex:.65;font-size:.7rem;color:var(--dim);letter-spacing:.08em;}
  .transport .play{flex:1.5;background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#2a1c00;border-color:var(--gold);
    font-weight:800;letter-spacing:.14em;text-shadow:0 1px 0 rgba(255,255,255,.25);}
  .transport .play.on{background:linear-gradient(180deg,#e8543f,var(--red));color:#fff;border-color:var(--red);text-shadow:0 1px 0 rgba(0,0,0,.3);}

  .credit{text-align:center;font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);padding:0 1rem .6rem;}
  .credit a{color:var(--gold);text-decoration:none;border-bottom:1px solid var(--hair);padding-bottom:1px;}
  .credit a:active{color:var(--gold-hi);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
  <header>
    <svg viewBox="0 0 100 62" aria-label="FFFF echo mark" role="img">
      <defs>
        <filter id="soft"><feGaussianBlur stdDeviation="1"/></filter>
        <g id="F"><rect x="0" y="0" width="8" height="54"/><rect x="0" y="0" width="30" height="8"/><rect x="0" y="23" width="22" height="8"/></g>
      </defs>
      <use href="#F" transform="translate(42,0)" fill="#f5b301" opacity="0.14" filter="url(#soft)"/>
      <use href="#F" transform="translate(28,0)" fill="#f5b301" opacity="0.28" filter="url(#soft)"/>
      <use href="#F" transform="translate(14,0)" fill="#f5b301" opacity="0.5" filter="url(#soft)"/>
      <use href="#F" transform="translate(-2,-1)" fill="#d23c2c" opacity="0.55"/>
      <use href="#F" transform="translate(2,1)"   fill="#3aa65a" opacity="0.55"/>
      <use href="#F" transform="translate(0,0)"   fill="#f5b301"/>
    </svg>
    <div class="brand"><span class="word">FFFF</span><span class="sub">Fast Feedback Frequency Finder</span></div>
    <span class="state" id="state">idle</span>
  </header>

  <div class="meter-wrap panel"><canvas id="scope"></canvas></div>

  <div class="readout">
    <input class="freq" id="freqInput" type="text" inputmode="decimal" value="1000.00" aria-label="frequency in hertz">
    <div class="unit" id="unit">HZ</div>
    <div class="note" id="note"></div>
    <div class="subline" id="subline"></div>
  </div>

  <div class="slider-block">
    <div class="rowmini" id="rangeToggle">
      <button data-min="70" data-max="10000" class="sel">70&ndash;10k</button>
      <button data-min="20" data-max="22000">Full 20&ndash;22k</button>
    </div>
    <div class="sweep-row">
      <button id="sweepBtn" class="rowmini-btn" style="border:1px solid var(--hair);border-radius:3px;background:transparent;color:var(--dim);font-family:inherit;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.42rem .8rem;">Sweep ▲</button>
      <input type="range" id="speed" min="2" max="30" step="1" value="8" aria-label="sweep speed seconds">
      <span class="sval" id="speedVal">8s</span>
    </div>
    <input type="range" id="slider" min="0" max="1" step="0.0001" value="0" aria-label="frequency slider, logarithmic">
    <div class="ends"><span id="endMin">70 Hz</span><span id="endMax">10 kHz</span></div>
  </div>

  <div class="pane">
    <div class="grid stations" id="stations"></div>
  </div>

  <div class="listen">
    <button id="listenBtn"><span class="lamp"></span><span id="listenLabel">Listen — analyse the room</span></button>
  </div>

  <div class="controls">
    <div class="wave-field">
      <label for="wave">Wave</label>
      <select id="wave">
        <option value="sine">Sine</option><option value="triangle">Triangle</option>
        <option value="square">Square</option><option value="sawtooth">Saw</option>
      </select>
    </div>
    <div class="vol">
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.5" aria-label="volume">
      <span class="v-val" id="volVal">50%</span>
    </div>
  </div>

  <div class="transport">
    <button class="mini" id="oct-down" aria-label="down one octave">÷2</button>
    <button id="nudge-down" aria-label="down 10 cents">−</button>
    <button class="play" id="play">PLAY</button>
    <button id="nudge-up" aria-label="up 10 cents">+</button>
    <button class="mini" id="oct-up" aria-label="up one octave">×2</button>
  </div>

  <div class="credit">Built by <a href="https://www.soundrich.co/software" target="_blank" rel="noopener noreferrer">Soundrich</a></div>

<script>
(() => {
  const ISO=[20,25,31.5,40,50,63,80,100,125,160,200,250,315,400,500,630,800,1000,
             1250,1600,2000,2500,3150,4000,5000,6300,8000,10000,12500,16000,20000];
  const HEAR_MIN=40, HEAR_MAX=16000;

  let FMIN=70,FMAX=10000,LN=Math.log(FMAX/FMIN);
  let freq=1000,wave='sine',playing=false,listening=false,sweeping=false,detected=0;
  let sweepStart=0,sweepDur=8;

  const fToT=f=>Math.log(f/FMIN)/LN, tToF=t=>FMIN*Math.exp(t*LN);
  const clampF=f=>Math.min(FMAX,Math.max(FMIN,f));
  const fmt=f=>{ if(f>=1000){let s=(f/1000).toFixed(2).replace(/\.?0+$/,'');return s+'k';}
                return (Number.isInteger(f)?f:f.toFixed(1)).toString(); };

  // ---- audio graph ----
  let ctx,osc,gain,analyser,data,micStream,micSrc,micAn,mData;
  function ensureCtx(){
    if(ctx)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    gain=ctx.createGain(); gain.gain.value=0;
    analyser=ctx.createAnalyser(); analyser.fftSize=2048; data=new Float32Array(analyser.fftSize);
    gain.connect(ctx.destination);
  }

  function startTone(){
    ensureCtx(); if(ctx.state==='suspended')ctx.resume();
    osc=ctx.createOscillator(); osc.type=wave; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    osc.connect(gain); osc.connect(analyser); osc.start();
    const t=ctx.currentTime,v=+vol.value*0.6;
    gain.gain.cancelScheduledValues(t); gain.gain.setValueAtTime(gain.gain.value,t);
    gain.gain.linearRampToValueAtTime(v,t+0.015);
    playing=true; setState(); ensureLoop();
  }
  function stopTone(){
    if(!playing)return; if(sweeping)cancelSweep();
    const t=ctx.currentTime;
    gain.gain.cancelScheduledValues(t); gain.gain.setValueAtTime(gain.gain.value,t);
    gain.gain.linearRampToValueAtTime(0,t+0.02);
    const o=osc; o.stop(t+0.04); o.onended=()=>{try{o.disconnect();}catch(e){}};
    playing=false; setState();
  }

  // ---- sweep ----
  function startSweep(){ if(listening)stopListen(); if(!playing)startTone();
    sweeping=true; sweepStart=ctx.currentTime; sweepBtn.classList.add('on'); freqInput.readOnly=true; setState(); }
  function cancelSweep(){ sweeping=false; sweepBtn.classList.remove('on'); if(!listening)freqInput.readOnly=false; setState(); }

  // ---- mic ----
  async function startListen(){
    if(sweeping)cancelSweep();
    ensureCtx(); if(ctx.state==='suspended')ctx.resume();
    try{ micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});}
    catch(e){ subline.textContent='Mic blocked — needs permission / https'; return; }
    micSrc=ctx.createMediaStreamSource(micStream);
    micAn=ctx.createAnalyser(); micAn.fftSize=8192; micAn.smoothingTimeConstant=0.75;
    mData=new Float32Array(micAn.frequencyBinCount); micSrc.connect(micAn);
    listening=true; setListenUI(); setState(); ensureLoop();
  }
  function stopListen(){
    listening=false; detected=0;
    if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
    if(micSrc){try{micSrc.disconnect();}catch(e){} micSrc=null;}
    setListenUI(); setState(); render();
  }

  // ---- refs ----
  const slider=document.getElementById('slider'),freqInput=document.getElementById('freqInput'),
        noteEl=document.getElementById('note'),subline=document.getElementById('subline'),
        unitEl=document.getElementById('unit'),playBtn=document.getElementById('play'),
        stateEl=document.getElementById('state'),vol=document.getElementById('vol'),
        volVal=document.getElementById('volVal'),stationsEl=document.getElementById('stations'),
        endMin=document.getElementById('endMin'),
        endMax=document.getElementById('endMax'),listenBtn=document.getElementById('listenBtn'),
        listenLabel=document.getElementById('listenLabel'),sweepBtn=document.getElementById('sweepBtn'),
        speed=document.getElementById('speed'),speedVal=document.getElementById('speedVal');

  function setState(){
    let s='idle',c='';
    if(listening){s='listening';c='hear';} else if(sweeping){s='sweeping';c='sweep';} else if(playing){s='playing';c='tone';}
    stateEl.textContent=s; stateEl.className='state'+(c?' '+c:'');
    playBtn.textContent=playing?'STOP':'PLAY'; playBtn.classList.toggle('on',playing);
  }
  function setListenUI(){
    listenBtn.classList.toggle('on',listening);
    listenLabel.textContent=listening?'Listening…':'Listen — analyse the room';
    freqInput.readOnly=listening||sweeping;
    freqInput.classList.toggle('hearing',listening);
    noteEl.classList.toggle('hearing',listening);
    unitEl.textContent=listening?'HZ · HEARING':'HZ';
  }

  const NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function noteText(f){ const m=69+12*Math.log2(f/440),r=Math.round(m),c=Math.round((m-r)*100);
    return `${NAMES[((r%12)+12)%12]+(Math.floor(r/12)-1)} <span class="cents">${c>0?'+':''}${c}\u00A2</span>`; }

  function highlight(target,cls){
    let best=null,bd=Infinity;
    stationsEl.querySelectorAll('button').forEach(b=>{ b.classList.remove('here','heard');
      const d=Math.abs(Math.log(+b.dataset.f/target)); if(d<bd){bd=d;best=b;} });
    if(best&&bd<0.03) best.classList.add(cls);
  }
  function paintFreq(f){ slider.value=fToT(f); slider.style.setProperty('--fill',(fToT(f)*100)+'%');
    freqInput.value=f.toFixed(f<100?2:1); noteEl.innerHTML=noteText(f); highlight(f,'here'); }

  function render(){
    freq=clampF(freq);
    if(!listening&&!sweeping){ paintFreq(freq); subline.textContent=''; }
    else { slider.value=fToT(freq); slider.style.setProperty('--fill',(fToT(freq)*100)+'%'); }
    if(playing&&osc&&!sweeping) osc.frequency.setTargetAtTime(freq,ctx.currentTime,0.008);
  }

  function buildStations(){
    stationsEl.innerHTML='';
    ISO.filter(f=>f>=FMIN&&f<=FMAX).forEach(f=>{
      const b=document.createElement('button'); b.textContent=fmt(f); b.dataset.f=f;
      b.onclick=()=>{ if(sweeping)cancelSweep(); freq=f; render(); }; stationsEl.appendChild(b);
    });
  }
  function setRange(min,max){ FMIN=min;FMAX=max;LN=Math.log(max/min);
    endMin.textContent=min<1000?min+' Hz':(min/1000)+' kHz';
    endMax.textContent=max<1000?max+' Hz':(max/1000)+' kHz';
    buildStations(); freq=clampF(freq); render(); }

  // ---- render loop ----
  const cv=document.getElementById('scope'),g=cv.getContext('2d');
  function size(){const r=cv.getBoundingClientRect(),d=devicePixelRatio||1;cv.width=r.width*d;cv.height=r.height*d;g.setTransform(d,0,0,d,0,0);}
  size(); addEventListener('resize',size);
  let rafOn=false,lastDetect=0;
  function ensureLoop(){ if(!rafOn){rafOn=true; requestAnimationFrame(loop);} }
  function loop(){
    if(!(playing||listening)){ rafOn=false; drawBase(); return; }
    if(sweeping&&playing){
      const el=(ctx.currentTime-sweepStart)%sweepDur, frac=el/sweepDur;
      freq=FMIN*Math.exp(frac*LN);
      osc.frequency.setValueAtTime(freq,ctx.currentTime);
      paintFreq(freq); subline.textContent='sweep — tap the number to freeze';
    }
    if(listening){ drawSpectrum(); const t=performance.now(); if(t-lastDetect>120){lastDetect=t; detect();} }
    else drawWave();
    requestAnimationFrame(loop);
  }
  function drawBase(){ const r=cv.getBoundingClientRect(); g.clearRect(0,0,r.width,r.height);
    g.strokeStyle='#f5b301'; g.lineWidth=2; g.globalAlpha=.5; g.beginPath(); g.moveTo(0,r.height/2); g.lineTo(r.width,r.height/2); g.stroke(); g.globalAlpha=1; }
  function drawWave(){ const r=cv.getBoundingClientRect(),w=r.width,h=r.height; g.clearRect(0,0,w,h);
    analyser.getFloatTimeDomainData(data);
    g.lineWidth=2; g.strokeStyle='#f5b301'; g.shadowColor='rgba(245,179,1,.6)'; g.shadowBlur=6; g.beginPath();
    const cyc=ctx.sampleRate/freq, span=Math.min(data.length,Math.max(cyc*3,64));
    for(let i=0;i<span;i++){const x=i/span*w,y=h/2-data[i]*h*0.42; i?g.lineTo(x,y):g.moveTo(x,y);}
    g.stroke(); g.shadowBlur=0; }
  function drawSpectrum(){ const r=cv.getBoundingClientRect(),w=r.width,h=r.height; g.clearRect(0,0,w,h);
    micAn.getFloatFrequencyData(mData);
    const sr=ctx.sampleRate,n=micAn.fftSize,logMin=Math.log(HEAR_MIN),logMax=Math.log(HEAR_MAX);
    const grad=g.createLinearGradient(0,h,0,0); grad.addColorStop(0,'rgba(58,166,90,.25)'); grad.addColorStop(.6,'rgba(245,179,1,.6)'); grad.addColorStop(1,'rgba(210,60,44,.9)');
    g.beginPath(); g.moveTo(0,h);
    for(let x=0;x<=w;x+=2){ const f=Math.exp(logMin+(x/w)*(logMax-logMin)),bin=Math.round(f*n/sr);
      const db=mData[Math.min(mData.length-1,Math.max(0,bin))],lvl=Math.max(0,Math.min(1,(db+90)/70)); g.lineTo(x,h-lvl*h); }
    g.lineTo(w,h); g.closePath(); g.fillStyle=grad; g.fill(); g.strokeStyle='rgba(245,179,1,.9)'; g.lineWidth=1.5; g.stroke(); }

  // ---- peak detect ----
  function detect(){
    micAn.getFloatFrequencyData(mData);
    const sr=ctx.sampleRate,n=micAn.fftSize,binHz=sr/n;
    const i0=Math.max(1,Math.floor(HEAR_MIN/binHz)),i1=Math.min(mData.length-2,Math.ceil(HEAR_MAX/binHz));
    const peaks=[];
    for(let i=i0;i<=i1;i++){ const y=mData[i];
      if(y>-72&&y>mData[i-1]&&y>=mData[i+1]){ const a=mData[i-1],b=y,c=mData[i+1],d=0.5*(a-c)/(a-2*b+c||1e-9);
        peaks.push({f:(i+d)*binHz,db:b}); } }
    peaks.sort((p,q)=>q.db-p.db);
    const picked=[]; for(const p of peaks){ if(picked.every(q=>Math.abs(Math.log(q.f/p.f))>0.11))picked.push(p); if(picked.length>=3)break; }
    if(!picked.length){ freqInput.value='— — —'; noteEl.innerHTML='no clear tone'; subline.textContent=''; detected=0;
      stationsEl.querySelectorAll('button').forEach(b=>b.classList.remove('here','heard')); return; }
    detected=picked[0].f; freqInput.value=detected.toFixed(1); noteEl.innerHTML=noteText(detected);
    const extra=picked.slice(1).map(p=>fmt(Math.round(p.f))).join(' · ');
    subline.textContent=(extra?'also '+extra+' Hz':'')+(playing?'   |  tone '+fmt(freq)+' Hz':'');
    highlight(detected,'heard');
  }

  // ---- events ----
  slider.addEventListener('input',()=>{ if(sweeping)cancelSweep(); freq=tToF(+slider.value); render(); });
  freqInput.addEventListener('focus',()=>{ if(!listening&&!sweeping)freqInput.select(); });
  freqInput.addEventListener('change',commit); freqInput.addEventListener('blur',commit);
  freqInput.addEventListener('keydown',e=>{if(e.key==='Enter')freqInput.blur();});
  function commit(){ if(listening||sweeping)return; const v=parseFloat(freqInput.value.replace(/[^0-9.]/g,''));
    if(!isNaN(v)&&v>0){freq=v;render();} else freqInput.value=freq.toFixed(2); }
  freqInput.addEventListener('click',()=>{ if(sweeping){cancelSweep();render();} else if(listening&&detected){freq=detected;render();} });

  document.getElementById('nudge-down').onclick=()=>{if(sweeping)cancelSweep();freq*=Math.pow(2,-10/1200);render();};
  document.getElementById('nudge-up').onclick  =()=>{if(sweeping)cancelSweep();freq*=Math.pow(2, 10/1200);render();};
  document.getElementById('oct-down').onclick  =()=>{if(sweeping)cancelSweep();freq/=2;render();};
  document.getElementById('oct-up').onclick    =()=>{if(sweeping)cancelSweep();freq*=2;render();};
  document.getElementById('wave').addEventListener('change',e=>{wave=e.target.value; if(playing&&osc)osc.type=wave;});
  vol.addEventListener('input',()=>{ volVal.textContent=Math.round(vol.value*100)+'%';
    if(playing&&gain)gain.gain.setTargetAtTime(vol.value*0.6,ctx.currentTime,0.01); });
  speed.addEventListener('input',()=>{ sweepDur=+speed.value; speedVal.textContent=sweepDur+'s';
    if(sweeping)sweepStart=ctx.currentTime; });

  document.getElementById('rangeToggle').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
    document.querySelectorAll('#rangeToggle button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); setRange(+b.dataset.min,+b.dataset.max); });

  playBtn.onclick=()=>playing?stopTone():startTone();
  listenBtn.onclick=()=>listening?stopListen():startListen();
  sweepBtn.onclick=()=>sweeping?cancelSweep():startSweep();

  setRange(70,10000); setState(); setListenUI(); drawBase();
})();
</script>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}</script>
</body>
